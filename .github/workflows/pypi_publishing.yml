name: Publish to PyPI

on:
  push:
    tags:
      - '*'

jobs:

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install build tools
        run: python3 -m pip install build --user

      - name: Build wheel and sdist
        run: python3 -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-test-pypi:
    name: Publish to Test PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: TestPyPI
      url: https://test.pypi.org/p/circtools
    permissions:
      id-token: write

    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-test-pypi:
    name: Verify Test PyPI install (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: publish-to-test-pypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python-version: ['3.10', '3.12']

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for Test PyPI index to propagate
        run: sleep 60

      - name: Install circtools from Test PyPI
        run: |
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            circtools

      - name: Verify installed version matches tag
        run: |
          EXPECTED="${{ github.ref_name }}"
          EXPECTED="${EXPECTED#v}"
          INSTALLED=$(python3 -c "import importlib.metadata; print(importlib.metadata.version('circtools'))")
          echo "Expected: $EXPECTED  |  Installed: $INSTALLED"
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! installed=$INSTALLED expected=$EXPECTED"
            exit 1
          fi
          echo "✅ Version matched: $INSTALLED"

  ci-full:
    name: CI ${{ matrix.python-version }} | ${{ matrix.os }}
    needs: verify-test-pypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-15-intel, macos-26, ubuntu-22.04, ubuntu-24.04]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.14']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Update pip & setuptools
        run: python3 -m pip install -U pip setuptools wheel

      - name: Install (macOS Intel)
        if: matrix.os == 'macos-15-intel'
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer || true
          brew install xz pkg-config make autoconf automake libtool || true
          export LDFLAGS="-L/opt/homebrew/lib"
          export CPPFLAGS="-I/opt/homebrew/include"
          export ARCHFLAGS="-arch x86_64"
          export HTSLIB_CONFIGURE_OPTIONS="--disable-lzma"
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            circtools

      - name: Install (macOS ARM / macos-26)
        if: startsWith(matrix.os, 'macos-15') || matrix.os == 'macos-26'
        run: |
          brew install xz pkg-config || true
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            circtools

      - name: Install (macOS 14)
        if: matrix.os == 'macos-14'
        run: |
          brew install xz pkg-config || true
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            circtools

      - name: Install Linux dependencies + circtools
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            make g++ zlib1g-dev \
            libblas-dev libatlas-base-dev liblapack-dev \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev
          pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            circtools

      - name: Fix zcat on macOS
        if: runner.os == 'macOS'
        run: sudo ln -sf $(which gzcat) /usr/local/bin/zcat

      - name: Install bedtools (with retry, build from source)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: error
          command: |
            if [ "$RUNNER_OS" = "Linux" ]; then
              wget https://github.com/arq5x/bedtools2/releases/download/v2.31.1/bedtools-2.31.1.tar.gz
              tar -xzf bedtools-2.31.1.tar.gz
              cd bedtools2 && make -j4
              sudo cp bin/* /usr/local/bin/
            elif [ "$RUNNER_OS" = "macOS" ]; then
              brew update || echo "brew update failed — continuing"
              brew install make zlib || true
              wget https://github.com/arq5x/bedtools2/releases/download/v2.31.1/bedtools-2.31.1.tar.gz
              tar -xzf bedtools-2.31.1.tar.gz
              cd bedtools2 && make -j4
              sudo cp bin/* /usr/local/bin/
            else
              echo "Unsupported OS: $RUNNER_OS" >&2; exit 1
            fi
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack test dataset
        run: |
          tar xvf ./tests/data/circtools_example.tar.bz2
          cd circtools_example
          [ -f genome.fa.gz ]      && gunzip -f genome.fa.gz
          [ -f annotation.gtf.gz ] && gunzip -f annotation.gtf.gz
          ls -lh genome.fa annotation.gtf || true

      - name: Run circtools detect
        run: |
          cd circtools_example
          circtools detect \
            @samplesheet -ss -T 2 -D \
            -an annotation.gtf -A genome.fa \
            -B @bam_files.txt -D -M -G \
            -Nr 5 6 -O ./circtools_ci -k

      - name: Check detect output vs master
        run: |
          cd circtools_example/circtools_ci
          ls -la && wc -l *
          if [ "$RUNNER_OS" = "Linux" ]; then
            MASTER_DIR="../circtools_ci_master"
            diff CircRNACount "$MASTER_DIR/CircRNACount"
            sha1sum -c "$MASTER_DIR/sha1sums.txt"
          elif [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.os }}" = "macos-13" ]; then
            MASTER_DIR="../circtools_ci_master_mac_amd"
            diff CircRNACount "$MASTER_DIR/CircRNACount"
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            MASTER_DIR="../circtools_ci_master_mac"
            diff CircRNACount "$MASTER_DIR/CircRNACount"
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          else
            echo "Unsupported OS: $RUNNER_OS" >&2; exit 1
          fi

      - name: Fix missing Strand column (if needed)
        run: |
          cd circtools_example/circtools_ci_master
          if [ "$(head -n1 LinearCount | awk -F'\t' '{sum=0; for(i=1;i<=NF;i++) if($i=="Strand") sum++; print sum}')" -eq 0 ]; then
            echo "➕ Adding missing Strand column..."
            awk 'BEGIN {OFS=FS="\t"}
                NR==1 {
                  for (i=1; i<=NF; i++) {
                    if (i==4) printf "Strand%s", OFS;
                    printf "%s%s", $i, (i<NF ? OFS : ORS)
                  }; next
                }
                {
                  for (i=1; i<=NF; i++) {
                    if (i==4) printf "+%s", OFS;
                    printf "%s%s", $i, (i<NF ? OFS : ORS)
                  }
                }' LinearCount > LinearCount_fixed && mv LinearCount_fixed LinearCount
          else
            echo "✅ Strand column already present — skipping."
          fi

      - name: Run circtest
        run: |
          cd circtools_example
          circtools circtest \
            -d ./circtools_ci_master/ \
            -c 5,6,7 -g 2,1,1 -l control,treatment \
            -r 3 -f 0.9 -p 0.01 -s 1 -C 1 \
            -o ./circtest_output -n test_output -M bw

      - name: Check circtest output (tolerant CSV + strict hashes)
        shell: bash
        run: |
          set -euo pipefail
          cd circtools_example/circtest_output
          ls -la && wc -l *

          if [ "$RUNNER_OS" = "Linux" ]; then
            MASTER_DIR="../circtest_output_master"; HASH_TOOL="sha1sum"
          elif [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.os }}" = "macos-13" ]; then
            MASTER_DIR="../circtest_output_master_mac_amd"; HASH_TOOL="shasum -a 1"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            MASTER_DIR="../circtest_output_master_mac"; HASH_TOOL="shasum -a 1"
          else
            echo "Unsupported OS: $RUNNER_OS" >&2; exit 1
          fi
          export MASTER_DIR HASH_TOOL

          python3 - <<'PY'
          import csv, math, os, sys
          ATOL, RTOL, MAX_REPORT = 1e-6, 1e-9, 20
          def is_float(s):
              try: float(s); return True
              except: return False
          def rows_equal(a, b):
              if len(a) != len(b): return False, "different column count"
              for idx, (x, y) in enumerate(zip(a, b), 1):
                  if is_float(x) and is_float(y):
                      if not math.isclose(float(x), float(y), rel_tol=RTOL, abs_tol=ATOL):
                          return False, f"numeric mismatch col {idx}: {x} vs {y}"
                  elif x != y:
                      return False, f"string mismatch col {idx}: '{x}' vs '{y}'"
              return True, ""
          md = os.environ["MASTER_DIR"]
          mismatches, reported = 0, 0
          with open("test_output.csv", newline='') as f1, \
               open(os.path.join(md, "test_output.csv"), newline='') as f2:
              for i, (a, b) in enumerate(zip(csv.reader(f1, delimiter='\t'),
                                             csv.reader(f2, delimiter='\t')), 1):
                  eq, why = rows_equal(a, b)
                  if not eq:
                      mismatches += 1
                      if reported < MAX_REPORT:
                          print(f"::warning::CSV diff at line {i}: {why}")
                          reported += 1
          tl = sum(1 for _ in open("test_output.csv"))
          gl = sum(1 for _ in open(os.path.join(md, "test_output.csv")))
          if tl != gl: mismatches += abs(tl - gl)
          with open(os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null"), "a") as s:
              s.write("✅ CSV ok\n" if mismatches == 0 else f"⚠️ CSV {mismatches} diffs\n")
          sys.exit(0)
          PY

          if [ -f "$MASTER_DIR/sha1sums.txt" ]; then
            TMP="$(mktemp)"
            grep -v ' test_output\.csv$' "$MASTER_DIR/sha1sums.txt" > "$TMP" || true
            [ -s "$TMP" ] && $HASH_TOOL -c "$TMP" || echo "No non-CSV hashes to verify."
            rm -f "$TMP"
          fi

      - name: Run padlock
        run: |
          cd circtools_example
          mkdir -p padlock_output
          circtools padlock \
            -f ./genome.fa -g ./annotation.gtf \
            -O mm -G Slc16a9 -T Slc16a9_padlock_design \
            -r 1 -b -o ./padlock_output

      - name: Check padlock output vs master
        run: |
          cd circtools_example/padlock_output
          ls -la && wc -l *
          if [ "$RUNNER_OS" = "Linux" ]; then
            MASTER_DIR="../padlock_output_master"
          elif [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.os }}" = "macos-13" ]; then
            MASTER_DIR="../padlock_output_master_mac_amd"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            MASTER_DIR="../padlock_output_master_mac"
          else
            echo "Unsupported OS: $RUNNER_OS" >&2; exit 1
          fi
          diff Slc16a9_padlock_design_linear_FSJ.csv "$MASTER_DIR/Slc16a9_padlock_design_linear_FSJ.csv"
          if [ "$RUNNER_OS" = "Linux" ]; then
            sha1sum -c "$MASTER_DIR/sha1sums.txt"
          else
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          fi

      - name: Run conservation
        env:
          MPLBACKEND: pdf
          MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig
        run: |
          cd circtools_example
          mkdir -p conservation/temp "$MPLCONFIGDIR"
          circtools conservation \
            -d ./circtools_ci_master/CircCoordinates \
            -f ./genome.fa -g ./annotation.gtf \
            -O mm -G Map3k5 \
            -o ./conservation/ -t ./conservation/temp/ \
            -TS hs -pairwise

      - name: Check conservation output vs master
        run: |
          set -x
          cd circtools_example/conservation
          if [ "$RUNNER_OS" = "Linux" ]; then
            MASTER_DIR="../conservation_master"
            diff alignment_Map3k5_10_20000698_20007954_+.fasta.aligned \
                 "$MASTER_DIR/alignment_Map3k5_10_20000698_20007954_+.fasta.aligned"
            sha1sum -c "$MASTER_DIR/sha1sums.txt"
          elif [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.os }}" = "macos-13" ]; then
            MASTER_DIR="../conservation_master_mac_amd"
            diff alignment_Map3k5_10_20000698_20007954_+.fasta.aligned \
                 "$MASTER_DIR/alignment_Map3k5_10_20000698_20007954_+.fasta.aligned"
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            MASTER_DIR="../conservation_master_mac"
            diff alignment_Map3k5_10_20000698_20007954_+.fasta.aligned \
                 "$MASTER_DIR/alignment_Map3k5_10_20000698_20007954_+.fasta.aligned"
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          else
            echo "Unsupported OS: $RUNNER_OS" >&2; exit 1
          fi

      - name: Run primex
        run: |
          cd circtools_example
          mkdir -p primer_output
          circtools primex \
            -d ./circtools_ci_master/CircCoordinates \
            -f ./genome.fa -g ./annotation.gtf \
            -O mm -G Slc16a9 -T "Slc16a9_primer" \
            -o ./primer_output/ || true

      - name: Check primex output vs master
        run: |
          set -x
          cd circtools_example/primer_output
          if [ "$RUNNER_OS" = "Linux" ]; then
            MASTER_DIR="../primer_output_master"
            diff Slc16a9_primer_results.csv "$MASTER_DIR/Slc16a9_primer_results.csv"
            sha1sum -c "$MASTER_DIR/sha1sums.txt"
          elif [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.os }}" = "macos-15-intel" ]; then
            MASTER_DIR="../primer_output_master_mac_amd_15"
            diff Slc16a9_primer_results.csv "$MASTER_DIR/Slc16a9_primer_results.csv"
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          elif [ "$RUNNER_OS" = "macOS" ] && [ "${{ matrix.os }}" = "macos-14" ]; then
            MASTER_DIR="../primer_output_master_mac_amd"
            diff Slc16a9_primer_results.csv "$MASTER_DIR/Slc16a9_primer_results.csv"
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            MASTER_DIR="../primer_output_master_mac"
            diff Slc16a9_primer_results.csv "$MASTER_DIR/Slc16a9_primer_results.csv"
            shasum -a 1 -c "$MASTER_DIR/sha1sums.txt"
          else
            echo "Unsupported OS: $RUNNER_OS" >&2; exit 1
          fi

  publish-to-pypi:
    name: Publish to PyPI (prod)
    needs: ci-full
    runs-on: ubuntu-latest
    environment:
      name: PyPI
      url: https://pypi.org/p/circtools
    permissions:
      id-token: write

    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify-prod-pypi:
    name: Verify prod PyPI install (${{ matrix.os }} / py${{ matrix.python-version }})
    needs: publish-to-pypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15]
        python-version: ['3.10', '3.12']

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for PyPI index to propagate
        run: sleep 60

      - name: Install circtools from PyPI
        run: pip install circtools

      - name: Verify installed version matches tag
        run: |
          EXPECTED="${{ github.ref_name }}"
          EXPECTED="${EXPECTED#v}"
          INSTALLED=$(python3 -c "import importlib.metadata; print(importlib.metadata.version('circtools'))")
          echo "Expected: $EXPECTED  |  Installed: $INSTALLED"
          if [ "$INSTALLED" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! installed=$INSTALLED expected=$EXPECTED"
            exit 1
          fi
          echo "✅ Prod PyPI install verified: $INSTALLED"